<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LedgerFlow Dashboard</title>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background:#0f172a; color:#e2e8f0; }
  header { background:#1e293b; padding:16px 24px; font-size:20px; font-weight:600; border-bottom:1px solid #334155; }
  .accent { color:#38bdf8; }
  .sub { font-size:14px; color:#94a3b8; font-weight:400; }
  main { max-width:900px; margin:24px auto; padding:0 16px; display:grid; gap:18px; }
  .card { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:16px 20px; }
  h2 { margin:0 0 12px; font-size:13px; color:#94a3b8; text-transform:uppercase; letter-spacing:.06em; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:8px 10px; border-bottom:1px solid #334155; }
  th { color:#94a3b8; font-size:13px; }
  .bal { font-variant-numeric: tabular-nums; font-weight:700; color:#4ade80; }
  form { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
  label { display:flex; flex-direction:column; font-size:12px; color:#94a3b8; gap:4px; }
  input { background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:8px 10px; border-radius:8px; font-size:14px; width:130px; }
  button { background:#38bdf8; color:#0f172a; border:none; padding:9px 16px; border-radius:8px; font-weight:700; cursor:pointer; }
  button:hover { background:#0ea5e9; }
  #log { font-family:ui-monospace,monospace; font-size:13px; white-space:pre-wrap; background:#0f172a; border:1px solid #334155; border-radius:8px; padding:12px; color:#cbd5e1; }
  .err { color:#f87171; }
  .ok { color:#4ade80; }
</style>
</head>
<body>
<header>💸 Ledger<span class="accent">Flow</span> &nbsp; <span class="sub">Payment &amp; Settlement Ledger</span></header>
<main>
  <div class="card">
    <h2>Konten</h2>
    <table>
      <thead><tr><th>ID</th><th>Inhaber</th><th>Währung</th><th>Saldo</th></tr></thead>
      <tbody id="accts"><tr><td colspan="4" style="color:#64748b">— noch keine Konten —</td></tr></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Konto anlegen</h2>
    <form id="f-create">
      <label>Inhaber<input name="ownerName" placeholder="Alice" required></label>
      <label>Währung<input name="currency" value="CHF" maxlength="3" required></label>
      <button>Anlegen</button>
    </form>
  </div>

  <div class="card">
    <h2>Einzahlen</h2>
    <form id="f-deposit">
      <label>Konto-ID<input name="id" type="number" placeholder="1" required></label>
      <label>Betrag<input name="amount" type="number" step="0.01" placeholder="100.00" required></label>
      <button>Einzahlen</button>
    </form>
  </div>

  <div class="card">
    <h2>Überweisen</h2>
    <form id="f-transfer">
      <label>Von (ID)<input name="source" type="number" placeholder="1" required></label>
      <label>Nach (ID)<input name="target" type="number" placeholder="2" required></label>
      <label>Betrag<input name="amount" type="number" step="0.01" placeholder="30.00" required></label>
      <button>Überweisen</button>
    </form>
  </div>

  <div class="card">
    <h2>Antwort</h2>
    <div id="log">Bereit.</div>
  </div>
</main>
<script>
const log = (msg, cls) => { const el = document.getElementById('log'); el.className = cls || ''; el.textContent = msg; };

async function api(method, url, body) {
  const res = await fetch(url, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined
  });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch (e) { data = text; }
  if (!res.ok) throw data;
  return data;
}

async function refresh() {
  try {
    const list = await api('GET', '/accounts');
    const tb = document.getElementById('accts');
    if (!list.length) { tb.innerHTML = '<tr><td colspan="4" style="color:#64748b">— noch keine Konten —</td></tr>'; return; }
    tb.innerHTML = list.map(a =>
      '<tr><td>' + a.id + '</td><td>' + a.ownerName + '</td><td>' + a.currency + '</td><td class="bal">' + Number(a.balance).toFixed(2) + '</td></tr>'
    ).join('');
  } catch (e) {}
}

const errText = (err) => (err && err.detail) ? err.detail : JSON.stringify(err);

document.getElementById('f-create').onsubmit = async (e) => {
  e.preventDefault();
  const f = e.target;
  try {
    const a = await api('POST', '/accounts', { ownerName: f.ownerName.value, currency: f.currency.value });
    log('✅ Konto angelegt: id ' + a.id + ' (' + a.ownerName + ')', 'ok');
    f.ownerName.value = '';
    refresh();
  } catch (err) { log('❌ ' + errText(err), 'err'); }
};

document.getElementById('f-deposit').onsubmit = async (e) => {
  e.preventDefault();
  const f = e.target;
  try {
    const a = await api('POST', '/accounts/' + f.id.value + '/deposit', { amount: parseFloat(f.amount.value) });
    log('✅ Eingezahlt. Neuer Saldo von Konto ' + a.id + ': ' + Number(a.balance).toFixed(2), 'ok');
    refresh();
  } catch (err) { log('❌ ' + errText(err), 'err'); }
};

document.getElementById('f-transfer').onsubmit = async (e) => {
  e.preventDefault();
  const f = e.target;
  const key = 'ui-' + Date.now() + '-' + Math.floor(Math.random() * 1000000);
  try {
    const t = await api('POST', '/transfers', {
      idempotencyKey: key,
      sourceAccountId: Number(f.source.value),
      targetAccountId: Number(f.target.value),
      amount: parseFloat(f.amount.value),
      description: 'via UI'
    });
    log('✅ Überweisung ok. Transaktion: ' + t.transactionId, 'ok');
    refresh();
  } catch (err) { log('❌ ' + errText(err), 'err'); }
};

refresh();
</script>
</body>
</html>
